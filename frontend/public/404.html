<!DOCTYPE html>
<html><head><meta charset="utf-8">
<script>
// SPA redirect for GitHub Pages — redirects 404 to index.html with path preserved
var path = window.location.pathname;
var repo = '/Jatak';
if (path.startsWith(repo)) {
  var route = path.slice(repo.length) || '/';
  sessionStorage.setItem('spa_redirect', route);
  window.location.replace(repo + '/');
}
</script>
</head><body></body></html>
